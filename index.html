<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성적 상위 20% 학생 분석</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; }
  .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

  <div class="max-w-6xl mx-auto">
    <header class="mb-10">
      <h1 class="text-3xl font-bold text-blue-900 tracking-tight">성적 상위 20% 학생 분석</h1>
      <p class="text-slate-500 mt-1">자료를 업로드하면 상위 20% 학생을 자동으로 분석합니다. (1개 파일만 올려도 순위가 표시됩니다)</p>
    </header>

    <div class="grid md:grid-cols-2 gap-6 mb-10">
      <div id="dropzone1" class="bg-white p-8 rounded-2xl shadow-sm border-2 border-dashed border-slate-300 transition-all text-center"
           ondragover="handleDrag(event, true, 'dropzone1')" ondragleave="handleDrag(event, false, 'dropzone1')" ondrop="handleDrop(event, 'dropzone1', 'file1')">
        <label class="block mb-2 font-semibold text-slate-700">1차 파일 업로드 (한셀/ Excel)</label>
        <input type="file" id="file1" accept=".csv, .xlsx, .xls" class="hidden">
        <div onclick="document.getElementById('file1').click()" class="cursor-pointer py-4 text-blue-600 font-medium">파일 선택 또는 드래그</div>
        <p id="status1" class="text-xs mt-2"></p>
      </div>
      <div id="dropzone2" class="bg-white p-8 rounded-2xl shadow-sm border-2 border-dashed border-slate-300 transition-all text-center"
           ondragover="handleDrag(event, true, 'dropzone2')" ondragleave="handleDrag(event, false, 'dropzone2')" ondrop="handleDrop(event, 'dropzone2', 'file2')">
        <label class="block mb-2 font-semibold text-slate-700">2차 파일 업로드 (한셀/ Excel) <span class="text-slate-400 font-normal">- 선택사항</span></label>
        <input type="file" id="file2" accept=".csv, .xlsx, .xls" class="hidden">
        <div onclick="document.getElementById('file2').click()" class="cursor-pointer py-4 text-blue-600 font-medium">파일 선택 또는 드래그</div>
        <p id="status2" class="text-xs mt-2"></p>
      </div>
    </div>

    <div id="errorBox" class="hidden mb-6 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm"></div>

    <div id="results" class="hidden space-y-8">

      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-bold text-slate-800 mb-4">1차 성적순 정렬 (상위 20% 강조)</h2>
          <div class="overflow-x-auto max-h-[480px] overflow-y-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-blue-50 sticky top-0">
                <tr><th class="p-2">순위</th><th class="p-2">성명</th><th class="p-2">점수</th><th class="p-2">비고</th></tr>
              </thead>
              <tbody id="table1"></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-bold text-slate-800 mb-4">2차 성적순 정렬 (상위 20% 강조)</h2>
          <div class="overflow-x-auto max-h-[480px] overflow-y-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-blue-50 sticky top-0">
                <tr><th class="p-2">순위</th><th class="p-2">성명</th><th class="p-2">점수</th><th class="p-2">비고</th></tr>
              </thead>
              <tbody id="table2"></tbody>
            </table>
          </div>
          <p id="table2Placeholder" class="text-sm text-slate-400 text-center py-6">2차 파일을 올리면 이곳에도 순위가 표시됩니다.</p>
        </div>
      </div>

      <div id="overlapSection" class="hidden space-y-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-slate-800">🌟 두 차 모두 상위 20% 유지 학생 (성적순)</h2>
            <button onclick="downloadOverlap()" class="bg-blue-800 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-blue-900 transition">명단 다운로드 (20~30% 포함)</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-blue-50">
                <tr><th class="p-2">순위</th><th class="p-2">성명</th><th class="p-2">1차 점수</th><th class="p-2">2차 점수</th><th class="p-2">평균</th></tr>
              </thead>
              <tbody id="overlapTop"></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-bold text-slate-800 mb-4">두 차 모두 20~30% 구간 학생 (성적순)</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-blue-50">
                <tr><th class="p-2">순위</th><th class="p-2">성명</th><th class="p-2">1차 점수</th><th class="p-2">2차 점수</th><th class="p-2">평균</th></tr>
              </thead>
              <tbody id="overlapBand"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

<script>
let data1 = [], data2 = [];
let top1 = [], top2 = [];
let overlapTop = [], overlapBand = [];

function handleDrag(e, isOver, zoneId) {
  e.preventDefault();
  const el = document.getElementById(zoneId);
  isOver ? el.classList.add('drag-over') : el.classList.remove('drag-over');
}

function handleDrop(e, zoneId, inputId) {
  e.preventDefault();
  document.getElementById(zoneId).classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (!files || files.length === 0) return;
  const input = document.getElementById(inputId);
  const dt = new DataTransfer();
  dt.items.add(files[0]);
  input.files = dt.files;
  input.dispatchEvent(new Event('change'));
}

window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => e.preventDefault());

document.getElementById('file1').onchange = (e) => { if (e.target.files[0]) processFile(e.target.files[0], (d) => { data1 = d; checkAll(); }, 'status1'); };
document.getElementById('file2').onchange = (e) => { if (e.target.files[0]) processFile(e.target.files[0], (d) => { data2 = d; checkAll(); }, 'status2'); };

function setLoading(statusId) {
  const el = document.getElementById(statusId);
  el.textContent = '⏳ 불러오는 중입니다...';
  el.className = 'text-xs mt-2 text-red-600 font-bold animate-pulse';
}
function setLoaded(statusId, count) {
  const el = document.getElementById(statusId);
  el.textContent = `✅ ${count}명 로드됨`;
  el.className = 'text-xs mt-2 text-slate-400';
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.remove('hidden');
}
function clearError() {
  document.getElementById('errorBox').classList.add('hidden');
}

function processFile(file, callback, statusId) {
  setLoading(statusId);
  const reader = new FileReader();
  reader.onload = (e) => {
    setTimeout(() => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = sheetToObjects(sheet);
        setLoaded(statusId, json.length);
        callback(json);
      } catch (err) {
        showError('파일 읽기 오류: ' + err.message);
        setLoaded(statusId, 0);
      }
    }, 30);
  };
  reader.readAsArrayBuffer(file);
}

function sheetToObjects(sheet) {
  const raw = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ''});
  let headerRowIdx = -1;
  for (let i = 0; i < raw.length; i++) {
    const row = raw[i].map(c => String(c).trim());
    if (row.some(c => /성명|이름/.test(c)) && row.some(c => /점수|성적/.test(c))) { headerRowIdx = i; break; }
  }
  if (headerRowIdx === -1) return XLSX.utils.sheet_to_json(sheet, {defval: ''});
  const headers = raw[headerRowIdx].map(c => String(c).trim());
  return raw.slice(headerRowIdx + 1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => { if (h) obj[h] = r[idx] !== undefined ? r[idx] : ''; });
    return obj;
  }).filter(obj => Object.values(obj).some(v => String(v).trim() !== ''));
}

function detectColumns(data) {
  const headers = Object.keys(data[0]);
  const comboKey = headers.find(h => /반.*번호|반\/번호/.test(h));
  const nameOnlyKey = headers.find(h => /이름|성명/.test(h));
  let scoreKey = headers.find(h => /점수|성적/.test(h) && !/총점|평균/.test(h));
  if (!scoreKey) scoreKey = headers.find(h => !isNaN(parseFloat(data[0][h])) && !/학년|총점/.test(h));
  return {comboKey, nameOnlyKey, scoreKey};
}

// 공백을 제거한 뒤 비교 (병합 셀 등으로 "학 년 총 점"처럼 글자 사이에 공백이 끼어도 걸러지도록)
const SUMMARY_PATTERN = /총점|응시생|평균|표준편차|등수|합계|인원|학년|반명|담임|과목|만점|비고|순위/;
const normalize = (s) => String(s).replace(/\s+/g, '');

function buildSorted(data) {
  const cols = detectColumns(data);
  const scoreKey = cols.scoreKey;
  if (!scoreKey || !cols.nameOnlyKey) return {sorted: [], top: []};

  const cleaned = data.map(d => {
    const rawName = String(d[cols.nameOnlyKey]).trim();
    let name = rawName;
    if (cols.comboKey) name = String(d[cols.comboKey]).trim() + ' ' + rawName;
    return {name, rawName, score: parseFloat(d[scoreKey])};
  }).filter(d => {
    if (!d.rawName) return false;
    const normName = normalize(d.name);
    const normRaw = normalize(d.rawName);
    // 총점/학년/평균 등 요약 행 제외 (공백 무시하고 비교)
    if (SUMMARY_PATTERN.test(normName) || SUMMARY_PATTERN.test(normRaw)) return false;
    // 실제 학생 이름(한글 2~5자)인지 검증 - 숫자, 기호, "총점" 같은 2글자 단어 오인 방지
    if (!/^[가-힣]{2,5}$/.test(normRaw)) return false;
    if (isNaN(d.score)) return false;
    return true;
  });
  const sorted = cleaned.sort((a, b) => b.score - a.score);
  return {sorted, top: sorted.slice(0, Math.max(1, Math.ceil(sorted.length * 0.2)))};
}

function getBand(sorted, fromRatio, toRatio) {
  return sorted.slice(Math.ceil(sorted.length * fromRatio), Math.ceil(sorted.length * toRatio));
}

function buildOverlapTable(arr1, arr2) {
  const map1 = new Map(arr1.map(d => [d.name, d.score]));
  const map2 = new Map(arr2.map(d => [d.name, d.score]));
  return [...map1.keys()].filter(n => map2.has(n)).map(n => ({name: n, score1: map1.get(n), score2: map2.get(n), avg: (map1.get(n) + map2.get(n)) / 2})).sort((a, b) => b.avg - a.avg);
}

function checkAll() {
  if (data1.length === 0 && data2.length === 0) return;
  clearError();

  let r1 = null, r2 = null;

  if (data1.length > 0) {
    r1 = buildSorted(data1);
    top1 = r1.top;
  } else {
    top1 = [];
    document.getElementById('table1').innerHTML = '';
  }

  if (data2.length > 0) {
    r2 = buildSorted(data2);
    top2 = r2.top;
    document.getElementById('table2Placeholder').classList.add('hidden');
  } else {
    top2 = [];
    document.getElementById('table2').innerHTML = '';
    document.getElementById('table2Placeholder').classList.remove('hidden');
  }

  // 상대 회차의 상위 20% 명단이 확정된 뒤에 렌더링 (양쪽 겹침 강조를 정확히 표시하기 위해)
  if (r1) renderTable('table1', r1.sorted, new Set(top1.map(d => d.name)), new Set(top2.map(d => d.name)));
  if (r2) renderTable('table2', r2.sorted, new Set(top2.map(d => d.name)), new Set(top1.map(d => d.name)));

  const overlapSection = document.getElementById('overlapSection');
  if (data1.length > 0 && data2.length > 0) {
    overlapTop = buildOverlapTable(top1, top2);
    overlapBand = buildOverlapTable(getBand(r1.sorted, 0.2, 0.3), getBand(r2.sorted, 0.2, 0.3));
    renderOverlapTable('overlapTop', overlapTop);
    renderOverlapTable('overlapBand', overlapBand);
    overlapSection.classList.remove('hidden');
  } else {
    overlapSection.classList.add('hidden');
  }

  document.getElementById('results').classList.remove('hidden');
}

function renderTable(tbodyId, sorted, ownTopSet, otherTopSet) {
  document.getElementById(tbodyId).innerHTML = sorted.map((d, i) => {
    const isTop = ownTopSet.has(d.name), isBoth = isTop && otherTopSet.has(d.name);
    return `<tr class="${isBoth ? 'bg-blue-100 font-bold' : (isTop ? 'bg-blue-50' : '')}">
      <td class="p-2">${i + 1}</td><td class="p-2">${d.name}</td><td class="p-2">${d.score}</td>
      <td class="p-2">${isBoth ? '🌟 양쪽 모두 상위 20%' : (isTop ? '상위 20%' : '')}</td>
    </tr>`;
  }).join('');
}

function renderOverlapTable(tbodyId, list) {
  document.getElementById(tbodyId).innerHTML = list.length ? list.map((d, i) => `
    <tr class="${i % 2 ? 'bg-blue-50/50' : ''}">
      <td class="p-2">${i + 1}</td><td class="p-2 font-semibold">${d.name}</td>
      <td class="p-2">${d.score1}</td><td class="p-2">${d.score2}</td><td class="p-2">${d.avg.toFixed(1)}</td>
    </tr>`).join('') : '<tr><td class="p-2 text-slate-400" colspan="5">해당 학생 없음</td></tr>';
}

function downloadOverlap() {
  const rows = [['구분', '순위', '성명', '1차 점수', '2차 점수', '평균']];
  overlapTop.forEach((d, i) => rows.push(['상위 20%', i+1, d.name, d.score1, d.score2, d.avg.toFixed(1)]));
  overlapBand.forEach((d, i) => rows.push(['20~30%', i+1, d.name, d.score1, d.score2, d.avg.toFixed(1)]));
  const blob = new Blob(['\ufeff' + rows.map(r => r.join(',')).join('\n')], {type: 'text/csv'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '분석_공통명단.csv';
  link.click();
}
</script>
</body>
</html>
