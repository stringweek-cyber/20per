<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성적 상위 20% 분석 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; }
  .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

  <div class="max-w-6xl mx-auto">
    <header class="mb-10">
      <h1 class="text-3xl font-bold text-blue-900 tracking-tight">성적 상위 20% 학생 분석</h1>
      <p class="text-slate-500 mt-1">파일을 아래 영역에 드래그하거나 클릭하여 업로드하세요.</p>
    </header>

    <div class="grid md:grid-cols-2 gap-6 mb-10">
      <div id="dropzone1" class="bg-white p-8 rounded-2xl shadow-sm border-2 border-dashed border-slate-300 transition-all text-center"
           ondragover="handleDrag(event, true, 'dropzone1')" ondragleave="handleDrag(event, false, 'dropzone1')" ondrop="handleDrop(event, 'dropzone1', 'file1')">
        <label class="block mb-2 font-semibold text-slate-700 cursor-pointer">1차 파일 (Excel/CSV)</label>
        <input type="file" id="file1" accept=".csv, .xlsx, .xls" class="hidden">
        <div onclick="document.getElementById('file1').click()" class="cursor-pointer py-4 text-sm text-blue-600 font-medium hover:text-blue-800">파일 선택 또는 드래그</div>
        <p id="status1" class="text-xs mt-2 text-slate-400"></p>
      </div>
      <div id="dropzone2" class="bg-white p-8 rounded-2xl shadow-sm border-2 border-dashed border-slate-300 transition-all text-center"
           ondragover="handleDrag(event, true, 'dropzone2')" ondragleave="handleDrag(event, false, 'dropzone2')" ondrop="handleDrop(event, 'dropzone2', 'file2')">
        <label class="block mb-2 font-semibold text-slate-700 cursor-pointer">2차 파일 (Excel/CSV)</label>
        <input type="file" id="file2" accept=".csv, .xlsx, .xls" class="hidden">
        <div onclick="document.getElementById('file2').click()" class="cursor-pointer py-4 text-sm text-blue-600 font-medium hover:text-blue-800">파일 선택 또는 드래그</div>
        <p id="status2" class="text-xs mt-2 text-slate-400"></p>
      </div>
    </div>

    <div id="results" class="hidden space-y-8">
      <!-- 결과 테이블 영역 -->
    </div>
  </div>

<script>
let data1 = [], data2 = [];

// 드래그 상태 관리
function handleDrag(e, isOver, id) {
  e.preventDefault();
  const el = document.getElementById(id);
  isOver ? el.classList.add('drag-over') : el.classList.remove('drag-over');
}

function handleDrop(e, zoneId, inputId) {
  e.preventDefault();
  document.getElementById(zoneId).classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    const input = document.getElementById(inputId);
    input.files = files;
    input.dispatchEvent(new Event('change'));
  }
}

function processFile(file, callback, statusId) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    document.getElementById(statusId).textContent = `✅ ${file.name} (${json.length}행 로드됨)`;
    callback(json);
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('file1').onchange = (e) => { if(e.target.files[0]) processFile(e.target.files[0], (d)=>{data1=d; checkAll();}, 'status1'); };
document.getElementById('file2').onchange = (e) => { if(e.target.files[0]) processFile(e.target.files[0], (d)=>{data2=d; checkAll();}, 'status2'); };

function checkAll() {
  if (data1.length > 0 && data2.length > 0) {
    document.getElementById('results').classList.remove('hidden');
    // 기존 분석 로직 연동
  }
}
</script>
</body>
</html>
